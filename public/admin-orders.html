<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pedidos da Fluxo Store.">
  <title>Pedidos | Fluxo Store</title>
  <link rel="icon" href="assets/img/logo.png">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="admin-orders">
  <header class="site-header admin-header">
    <div class="container header-inner">
      <a class="brand" href="admin.html" aria-label="Fluxo Store">
        <img src="assets/img/logo.png" alt="Fluxo Store">
        <span>FLUXO <span class="text-gold">STORE</span></span>
      </a>
      <nav class="main-nav" aria-label="Menu admin">
